services:
  - type: web
    name: eeg-motor-imagery-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python download_data.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
